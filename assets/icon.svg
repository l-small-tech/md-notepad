<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- MD Notepad app icon: "M↓" on a Fluent-style blue plate (Windows 11
       Notepad palette). Near-full-bleed so it doesn't render smaller than
       neighboring taskbar icons. Regenerate the platform icon set with:
       npm run tauri icon assets/icon.svg -->
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6fb7f0"/>
      <stop offset="0.55" stop-color="#3b82d6"/>
      <stop offset="1" stop-color="#1a5db5"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.25" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glyph-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0a3268" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="48" y="48" width="928" height="928" rx="150" fill="url(#plate)"/>
  <!-- soft top rim highlight, a Fluent touch -->
  <rect x="48" y="48" width="928" height="928" rx="150" fill="url(#rim)"/>

  <g filter="url(#glyph-shadow)">
    <!-- M -->
    <polyline points="190,712 190,318 370,540 550,318 550,712"
      fill="none" stroke="#ffffff" stroke-width="96"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- down arrow -->
    <line x1="750" y1="330" x2="750" y2="500"
      stroke="#ffffff" stroke-width="96" stroke-linecap="round"/>
    <path d="M632 548 L868 548 L750 700 Z"
      fill="#ffffff" stroke="#ffffff" stroke-width="44" stroke-linejoin="round"/>
  </g>
</svg>
