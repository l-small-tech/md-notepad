# CI gate. A milestone is not done with a red matrix.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check # tsc --noEmit && eslint && prettier --check
      - run: npm test

  rust-and-build:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 keeps the oldest supported glibc for Linux builds;
        # if GitHub retires the runner image, move to ubuntu-24.04.
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux webview dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # tauri::generate_context! embeds ../dist at compile time; the Rust
      # crate cannot even typecheck without a frontend build present.
      - run: npm run build

      - name: cargo fmt
        run: cargo fmt --check
        working-directory: src-tauri

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: cargo test
        run: cargo test
        working-directory: src-tauri

      # Debug build (no bundling) proves the webview stack links on each OS.
      - name: cargo build (link smoke test)
        run: cargo build
        working-directory: src-tauri
